name: Release

# 推送形如 v1.2.3 的 tag 时：各平台交叉编译并打成「开箱即用」的部署包，
# 再由单独的发布作业统一创建 GitHub Release 并上传全部产物（避免并发创建 Release 冲突）。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  RELEASE_REPO: ccvar/gcms-releases

jobs:
  build:
    name: 编译打包 ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: 交叉编译并打包（含预编译二进制 + 启停脚本 + 默认配置 + README）
        env:
          VERSION: ${{ github.ref_name }}
          RELEASE_REPO: ${{ env.RELEASE_REPO }}
          GCMS_RELEASE_PUBLIC_KEY: ${{ secrets.GCMS_RELEASE_PUBLIC_KEY }}
        run: |
          set -e
          if [ -z "${GCMS_RELEASE_PUBLIC_KEY:-}" ]; then
            echo "::error::标准发布包要求内置更新验签公钥，请配置 GCMS_RELEASE_PUBLIC_KEY。"
            exit 1
          fi
          printf '%s\n' "$GCMS_RELEASE_PUBLIC_KEY" > scripts/update-public.pem
          sh scripts/package.sh ${{ matrix.goos }} ${{ matrix.goarch }}
          # Windows 额外提供 .zip（更通用），并移除其 tar.gz
          if [ "${{ matrix.goos }}" = "windows" ]; then
            name="cms-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
            (cd dist && zip -qr "$name.zip" "$name" && rm -f "$name.tar.gz")
          fi
          echo "--- 产物 ---"; ls -lh dist/*.tar.gz dist/*.zip 2>/dev/null || true

      - name: 上传构建产物（供发布作业汇总）
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error
          retention-days: 3

  release:
    name: 发布到公开 Release 仓库
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 检查公开仓库发布 Token
        env:
          GCMS_RELEASE_TOKEN: ${{ secrets.GCMS_RELEASE_TOKEN }}
          GCMS_RELEASE_PUBLIC_KEY: ${{ secrets.GCMS_RELEASE_PUBLIC_KEY }}
          GCMS_RELEASE_SIGNING_KEY: ${{ secrets.GCMS_RELEASE_SIGNING_KEY }}
        run: |
          if [ -z "$GCMS_RELEASE_TOKEN" ]; then
            echo "::error::请在私有源码仓库配置 GCMS_RELEASE_TOKEN，授予 ${RELEASE_REPO} Contents: Read and write 权限。"
            exit 1
          fi
          if [ -z "$GCMS_RELEASE_PUBLIC_KEY" ]; then
            echo "::error::请配置 GCMS_RELEASE_PUBLIC_KEY，标准发布包需要携带更新验签公钥。"
            exit 1
          fi
          if [ -z "$GCMS_RELEASE_SIGNING_KEY" ]; then
            echo "::error::请配置 GCMS_RELEASE_SIGNING_KEY，manifest.json 必须生成签名。"
            exit 1
          fi

      - name: 下载全部平台产物
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: 列出待发布文件
        run: ls -lh dist

      - name: 生成 SHA256 校验文件
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt
          cat checksums.txt

      - name: 生成更新清单
        env:
          VERSION: ${{ github.ref_name }}
          SOURCE_COMMIT: ${{ github.sha }}
          GCMS_RELEASE_PUBLIC_KEY: ${{ secrets.GCMS_RELEASE_PUBLIC_KEY }}
        run: |
          cd dist
          python3 - <<'PY'
          import datetime
          import hashlib
          import json
          import os
          import pathlib

          version = os.environ["VERSION"]
          repo = os.environ["RELEASE_REPO"]
          base = f"https://github.com/{repo}/releases/download/{version}"
          signing_enabled = bool(os.environ.get("GCMS_RELEASE_PUBLIC_KEY"))
          assets = []
          packages = sorted(list(pathlib.Path(".").glob("*.tar.gz")) + list(pathlib.Path(".").glob("*.zip")))

          for pkg in packages:
              name = pkg.name
              stem = name[:-7] if name.endswith(".tar.gz") else pkg.stem
              parts = stem.rsplit("-", 2)
              if len(parts) != 3:
                  continue
              digest = hashlib.sha256(pkg.read_bytes()).hexdigest()
              assets.append({
                  "name": name,
                  "os": parts[1],
                  "arch": parts[2],
                  "url": f"{base}/{name}",
                  "sha256": digest,
                  "size": pkg.stat().st_size,
              })

          manifest = {
              "schema": 1,
              "name": "gcms",
              "version": version,
              "release_repo": repo,
              "release_url": f"https://github.com/{repo}/releases/tag/{version}",
              "manifest_url": f"{base}/manifest.json",
              "checksum_url": f"{base}/checksums.txt",
              "published_at": datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "notes": f"GCMS {version} 发布包。",
              "source_commit": os.environ["SOURCE_COMMIT"],
              "assets": assets,
          }
          if signing_enabled:
              manifest["manifest_signature_url"] = f"{base}/manifest.json.sig"
              manifest["manifest_signature_algorithm"] = "openssl-sha256-rsa"
          pathlib.Path("manifest.json").write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
          cat > RELEASE_NOTES.md <<EOF
          GCMS ${{ github.ref_name }} 发布包。

          此公开仓库只存放已编译二进制、校验文件和更新清单；源码仓库保持私有。
          EOF
          cat manifest.json

      - name: 生成 manifest 签名
        env:
          GCMS_RELEASE_SIGNING_KEY: ${{ secrets.GCMS_RELEASE_SIGNING_KEY }}
        run: |
          cd dist
          if [ -z "${GCMS_RELEASE_SIGNING_KEY:-}" ]; then
            echo "::error::缺少 GCMS_RELEASE_SIGNING_KEY，无法生成 manifest 签名。"
            exit 1
          fi
          key_file="$(mktemp)"
          printf '%s\n' "$GCMS_RELEASE_SIGNING_KEY" > "$key_file"
          chmod 600 "$key_file"
          openssl dgst -sha256 -sign "$key_file" -out manifest.json.sig manifest.json
          rm -f "$key_file"
          ls -lh manifest.json.sig

      - name: 发布 Release（上传到公开仓库）
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPO }}
          token: ${{ secrets.GCMS_RELEASE_TOKEN }}
          tag_name: ${{ github.ref_name }}
          target_commitish: main
          name: ${{ github.ref_name }}
          body_path: dist/RELEASE_NOTES.md
          make_latest: true
          fail_on_unmatched_files: false
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/manifest.json
            dist/manifest.json.sig
