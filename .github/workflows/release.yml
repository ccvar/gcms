name: Release

# 推送形如 v1.2.3 的 tag 时：先做构建检查，再为各平台交叉编译并打包，
# 最后自动创建 GitHub Release 并上传所有平台的部署包。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # 创建 Release / 上传产物所需

jobs:
  check:
    name: 构建检查（vet）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - run: go vet ./...
      - run: go build ./...

  release:
    name: 编译并打包 ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: 打包（复用 scripts/package.sh，纯 Go 交叉编译）
        run: |
          VERSION="${GITHUB_REF_NAME}" ./scripts/package.sh ${{ matrix.goos }} ${{ matrix.goarch }}
          # Windows 额外提供 .zip（更通用），并移除其 tar.gz
          if [ "${{ matrix.goos }}" = "windows" ]; then
            name="cms-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
            (cd dist && zip -qr "$name.zip" "$name" && rm -f "$name.tar.gz")
          fi

      - name: 创建/更新 Release 并上传产物
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/*.tar.gz
            dist/*.zip
