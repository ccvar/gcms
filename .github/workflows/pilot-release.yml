name: Pilot Release

# 推形如 pilot-v0.1.8 的 tag 时：在 macOS + Windows runner 上各自打包 GCMS Pilot，
# ed25519 签更新包，再由 publish 作业合成同时含两平台的 latest.json，一起发到 pilot-releases 仓。
on:
  push:
    tags:
      - "pilot-v*"

permissions:
  contents: read

env:
  RELEASE_REPO: ccvar/gcms-pilot-releases

jobs:
  build:
    name: 构建 ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
            platform: darwin-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - name: 检查发布密钥
        shell: bash
        run: |
          if [ -z "${{ secrets.PILOT_RELEASES_TOKEN }}" ]; then
            echo "::error::缺少 PILOT_RELEASES_TOKEN（需对 ${RELEASE_REPO} 授予 Contents 读写）。"; exit 1
          fi
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "::error::缺少 TAURI_SIGNING_PRIVATE_KEY（更新包 ed25519 签名私钥）。"; exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 + ed25519 更新签名
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: 收集产物 + 平台片段
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
          PLATFORM: ${{ matrix.platform }}
          TARGET: ${{ matrix.target }}
        run: |
          set -e
          ver="${VERSION#pilot-v}"
          bundle="src-tauri/target/${TARGET}/release/bundle"
          out="$GITHUB_WORKSPACE/dist"
          rm -rf "$out"; mkdir -p "$out"
          base="https://github.com/${RELEASE_REPO}/releases/download/${VERSION}"
          if [ "$PLATFORM" = "darwin-aarch64" ]; then
            cp "$(ls "$bundle"/dmg/*.dmg | head -1)"          "$out/GCMS-Pilot_${ver}_aarch64.dmg"
            cp "$(ls "$bundle"/macos/*.app.tar.gz | head -1)" "$out/GCMS-Pilot_${ver}_aarch64.app.tar.gz"
            sig=$(cat "$(ls "$bundle"/macos/*.app.tar.gz.sig | head -1)")
            url="${base}/GCMS-Pilot_${ver}_aarch64.app.tar.gz"
          else
            # Tauri 2 的 Windows 更新产物就是 NSIS 安装器 -setup.exe 本身（附同名 .sig），没有 .nsis.zip。
            ls -la "$bundle"/nsis/ || true
            sigfile=$(ls "$bundle"/nsis/*.sig | head -1)   # 更新签名文件
            signed="${sigfile%.sig}"                        # 它签的就是那个 -setup.exe
            cp "$signed" "$out/GCMS-Pilot_${ver}_x64-setup.exe"
            sig=$(cat "$sigfile")
            url="${base}/GCMS-Pilot_${ver}_x64-setup.exe"
          fi
          node -e 'const fs=require("fs");const [dest,plat,url,sig]=process.argv.slice(1);fs.writeFileSync(dest,JSON.stringify({[plat]:{signature:sig,url}}))' "$out/frag-${PLATFORM}.json" "$PLATFORM" "$url" "$sig"
          ls -lh "$out"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: dist/
          retention-days: 1

  publish:
    name: 合成 latest.json 并发布
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all

      - name: 汇总产物 + 合并两平台 latest.json
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -e
          ver="${VERSION#pilot-v}"
          out="release"; rm -rf "$out"; mkdir -p "$out"
          # 拷贝所有平台产物（排除中间的片段 json）
          find all -type f ! -name 'frag-*.json' -exec cp {} "$out/" \;
          python3 - "$out/latest.json" "$ver" all <<'PY'
          import sys, json, glob, datetime, pathlib
          dest, ver, root = sys.argv[1:4]
          platforms = {}
          for f in sorted(glob.glob(f"{root}/**/frag-*.json", recursive=True)):
              platforms.update(json.load(open(f)))
          data = {
              "version": ver,
              "notes": f"GCMS Pilot {ver}",
              "pub_date": datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "platforms": platforms,
          }
          pathlib.Path(dest).write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
          echo "=== latest.json ==="; cat "$out/latest.json"; echo; ls -lh "$out"

      - name: 发布 Release（macOS + Windows 一起）
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASE_REPO }}
          token: ${{ secrets.PILOT_RELEASES_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          make_latest: true
          fail_on_unmatched_files: false
          files: |
            release/*
