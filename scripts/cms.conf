# =============================================================================
# CCVAR 简记 CMS · 启停脚本配置文件
#
#   cms.sh / cms.ps1 启动时默认读取本文件（与脚本同目录）。修改后下次 start 生效。
#   命令行上显式设置的环境变量优先级更高，例如：
#       ADDR=:9090 ./scripts/cms.sh start
#       $env:ADDR=":9090"; .\scripts\cms.ps1 start
#
#   格式：KEY=VALUE，每行一项；# 开头为注释；值后可跟 # 行内注释。
# =============================================================================

# 监听地址（host:port；host 留空表示本机所有网卡）
ADDR=:8080

# 站点绝对地址（用于 canonical / Open Graph / sitemap）。
# 生产环境务必设为 https 域名，如 https://cms.ccvar.com
# 留空则自动取 http://localhost<ADDR>
BASE_URL=

# SQLite 数据库文件路径（相对项目根目录或绝对路径）
CMS_DB=data/cms.db

# 需要自动安装 Go 时下载的版本（本机已装且 >= 1.23 则忽略）
GO_VERSION=1.23.4
