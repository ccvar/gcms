{{define "body"}}  <div class="login-wrap">
    {{if gt (len .AdminLangs) 1}}
    <nav class="login-lang-switch" aria-label="{{.Admin.T "admin.lang.label" "后台语言"}}">
      {{range .AdminLangs}}<a href="/admin/language?lang={{.Code}}&next={{urlquery $.AdminReturn}}"{{if eq .Code $.AdminLang}} class="active" aria-current="true"{{end}}>{{.Name}}</a>{{end}}
    </nav>
    {{end}}
    <div class="login-card">
    <h1>{{.Admin.T "admin.login.title" "登录后台"}}</h1>
    {{if .FormErr}}<div class="form-err">{{.FormErr}}</div>{{end}}
    <form method="post" action="/admin/login">
      <input type="hidden" name="_csrf" value="{{.CSRF}}">
      <div class="field">
        <label for="u">{{.Admin.T "admin.login.username" "用户名"}}</label>
        <input id="u" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="p">{{.Admin.T "admin.login.password" "密码"}}</label>
        <input id="p" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%">{{.Admin.T "admin.login.submit" "登录"}}</button>
    </form>
    </div>
  </div>
{{end}}
