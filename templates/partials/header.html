{{define "header"}}  <header class="site-header">
    <div class="wrap">
      {{if and .Site.Logo (ne .Site.Brand "text")}}<a class="brand has-logo{{if eq .Site.Brand "both"}} with-name{{end}}" href="{{.Tr.U "/"}}"><img class="brand-logo" src="{{.Site.Logo}}" alt="{{.Site.Name}}">{{if eq .Site.Brand "both"}}<span class="brand-name">{{.Site.Name}}</span>{{end}}</a>{{else}}<a class="brand" href="{{.Tr.U "/"}}">{{.Site.Name}}</a>{{end}}
      <nav class="nav" aria-label="主导航">
        {{range .Menu}}<a href="{{.Href}}"{{if .External}} target="_blank" rel="noopener"{{end}}{{if .Active}} aria-current="page"{{end}}>{{.Label}}</a>
        {{end}}
        <a class="search-ico" href="{{.Tr.U "/search"}}"{{if eq .Nav "search"}} aria-current="page"{{end}} aria-label="{{.Tr.T "nav.search"}}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        </a>
        {{if gt (len .Langs) 1}}
        <details class="lang-switch">
          <summary aria-label="{{.Tr.T "lang.switch"}}" title="{{.Tr.T "lang.switch"}}">
            <svg class="lang-globe" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span class="lang-cur">{{.Tr.Name}}</span>
          </summary>
          <ul class="lang-menu" role="listbox">
            {{range .Langs}}<li><a href="{{.URL}}"{{if .Active}} class="on" aria-current="true"{{end}}>{{.Name}}</a></li>
            {{end}}
          </ul>
        </details>
        {{end}}
      </nav>
    </div>
  </header>
{{end}}
