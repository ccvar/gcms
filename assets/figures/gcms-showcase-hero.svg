<svg class="gcms-showcase-hero" viewBox="0 0 560 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="gcms turns admin content and SQLite data into pages, APIs and release packages">
  <defs>
    <linearGradient id="bg" x1="36" y1="32" x2="520" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FCFF"/>
      <stop offset="1" stop-color="#EAF8F6"/>
    </linearGradient>
    <linearGradient id="chip" x1="214" y1="132" x2="346" y2="264" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172033"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#182235" flood-opacity=".16"/>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <path id="flow-admin" d="M151 147 C188 146 202 172 234 191"/>
    <path id="flow-sqlite" d="M141 293 C176 264 204 244 234 229"/>
    <path id="flow-pages" d="M326 188 C360 155 385 135 424 126"/>
    <path id="flow-api" d="M330 226 C363 236 390 253 421 283"/>
    <path id="flow-release" d="M279 271 C279 302 279 326 279 352"/>
    <style>
      .gcms-showcase-hero text {
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .gcms-showcase-hero .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }
      .gcms-showcase-hero .grid {
        stroke: #CFE4F8;
        stroke-width: 1;
        opacity: .55;
      }
      .gcms-showcase-hero .dot {
        fill: #BCD5EA;
        opacity: .45;
      }
      .gcms-showcase-hero .card {
        fill: rgba(255,255,255,.9);
        stroke: #D8E6F1;
        stroke-width: 1.4;
      }
      .gcms-showcase-hero .wire {
        stroke: #BFD3E6;
        stroke-width: 1.8;
        stroke-dasharray: 5 8;
        stroke-linecap: round;
      }
      .gcms-showcase-hero .accent {
        fill: #0F7CFF;
      }
      .gcms-showcase-hero .accent-stroke {
        stroke: #0F7CFF;
      }
      .gcms-showcase-hero .brand {
        fill: #AA3D31;
      }
      .gcms-showcase-hero .muted {
        fill: #71829A;
      }
      .gcms-showcase-hero .ink {
        fill: #0F172A;
      }
      .gcms-showcase-hero .particle {
        fill: #0F7CFF;
        filter: drop-shadow(0 0 6px rgba(15,124,255,.55));
      }
      .gcms-showcase-hero .particle.brand {
        fill: #AA3D31;
      }
      .gcms-showcase-hero .pulse {
        animation: pulse 3.8s ease-out infinite;
        transform-origin: 280px 209px;
      }
      .gcms-showcase-hero .breath {
        animation: breath 4.4s ease-in-out infinite;
        transform-origin: 280px 209px;
      }
      .gcms-showcase-hero .float-a {
        animation: floatA 5.2s ease-in-out infinite;
      }
      .gcms-showcase-hero .float-b {
        animation: floatB 5.8s ease-in-out infinite;
      }
      .gcms-showcase-hero .float-c {
        animation: floatC 6.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0% { transform: scale(.85); opacity: .3; }
        70% { transform: scale(1.35); opacity: .04; }
        100% { transform: scale(1.35); opacity: 0; }
      }
      @keyframes breath {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.035); }
      }
      @keyframes floatA {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); }
      }
      @keyframes floatB {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(6px); }
      }
      @keyframes floatC {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .gcms-showcase-hero .pulse,
        .gcms-showcase-hero .breath,
        .gcms-showcase-hero .float-a,
        .gcms-showcase-hero .float-b,
        .gcms-showcase-hero .float-c {
          animation: none;
        }
        .gcms-showcase-hero .particle {
          display: none;
        }
      }
    </style>
  </defs>

  <rect x="18" y="20" width="524" height="380" rx="34" fill="url(#bg)"/>
  <g opacity=".65">
    <path class="grid" d="M70 20V400M122 20V400M174 20V400M226 20V400M278 20V400M330 20V400M382 20V400M434 20V400M486 20V400"/>
    <path class="grid" d="M18 72H542M18 124H542M18 176H542M18 228H542M18 280H542M18 332H542"/>
    <g>
      <circle class="dot" cx="78" cy="82" r="2"/>
      <circle class="dot" cx="130" cy="134" r="2"/>
      <circle class="dot" cx="182" cy="290" r="2"/>
      <circle class="dot" cx="238" cy="98" r="2"/>
      <circle class="dot" cx="354" cy="330" r="2"/>
      <circle class="dot" cx="478" cy="126" r="2"/>
      <circle class="dot" cx="500" cy="284" r="2"/>
      <circle class="dot" cx="91" cy="339" r="2"/>
    </g>
  </g>
  <circle cx="280" cy="209" r="116" fill="#0F7CFF" opacity=".11" filter="url(#soft)"/>

  <path class="wire" d="M151 147 C188 146 202 172 234 191"/>
  <path class="wire" d="M141 293 C176 264 204 244 234 229"/>
  <path class="wire" d="M326 188 C360 155 385 135 424 126"/>
  <path class="wire" d="M330 226 C363 236 390 253 421 283"/>
  <path class="wire" d="M279 271 C279 302 279 326 279 352"/>

  <circle class="particle" r="4.3">
    <animateMotion dur="2.9s" repeatCount="indefinite"><mpath href="#flow-admin"/></animateMotion>
  </circle>
  <circle class="particle" r="3.8" opacity=".82">
    <animateMotion dur="3.2s" begin=".8s" repeatCount="indefinite"><mpath href="#flow-sqlite"/></animateMotion>
  </circle>
  <circle class="particle" r="4.1">
    <animateMotion dur="3.1s" begin=".35s" repeatCount="indefinite"><mpath href="#flow-pages"/></animateMotion>
  </circle>
  <circle class="particle" r="3.5" opacity=".8">
    <animateMotion dur="3.4s" begin="1.1s" repeatCount="indefinite"><mpath href="#flow-api"/></animateMotion>
  </circle>
  <circle class="particle brand" r="4">
    <animateMotion dur="3.2s" begin=".55s" repeatCount="indefinite"><mpath href="#flow-release"/></animateMotion>
  </circle>

  <g class="float-a" filter="url(#shadow)">
    <rect class="card" x="62" y="96" width="122" height="92" rx="18"/>
    <circle cx="84" cy="120" r="6" class="brand"/>
    <rect x="100" y="115" width="50" height="10" rx="5" fill="#0F172A"/>
    <rect x="84" y="140" width="76" height="7" rx="3.5" fill="#D6DEE8"/>
    <rect x="84" y="156" width="58" height="7" rx="3.5" fill="#D6DEE8"/>
    <text x="84" y="180" class="mono muted" font-size="12">Admin</text>
  </g>

  <g class="float-b" filter="url(#shadow)">
    <rect class="card" x="390" y="82" width="120" height="86" rx="18"/>
    <rect x="414" y="108" width="56" height="9" rx="4.5" class="accent"/>
    <rect x="414" y="129" width="72" height="7" rx="3.5" fill="#D6DEE8"/>
    <text x="414" y="151" class="mono muted" font-size="12">SSR pages</text>
  </g>

  <g class="float-c" filter="url(#shadow)">
    <rect class="card" x="397" y="252" width="126" height="84" rx="18"/>
    <rect x="420" y="278" width="44" height="9" rx="4.5" fill="#21C7B7"/>
    <rect x="420" y="299" width="72" height="7" rx="3.5" fill="#D6DEE8"/>
    <text x="420" y="321" class="mono muted" font-size="12">API hooks</text>
  </g>

  <g class="float-b" filter="url(#shadow)">
    <rect class="card" x="220" y="334" width="120" height="58" rx="18"/>
    <path d="M246 358h48l14 12H232l14-12Z" fill="#F2F6FA" stroke="#D8E6F1" stroke-width="1.4"/>
    <rect x="246" y="350" width="48" height="9" rx="4.5" class="brand"/>
    <text x="235" y="384" class="mono muted" font-size="11">Release</text>
  </g>

  <g class="float-c">
    <ellipse cx="120" cy="272" rx="43" ry="14" fill="#EAF4FF" stroke="#0F7CFF" stroke-width="2.2"/>
    <path d="M77 272v42c0 8 19 14 43 14s43-6 43-14v-42" fill="#F8FCFF" stroke="#0F7CFF" stroke-width="2.2"/>
    <path d="M77 294c0 8 19 14 43 14s43-6 43-14" stroke="#0F7CFF" stroke-width="2.2"/>
    <text x="89" y="353" class="mono muted" font-size="12">SQLite</text>
  </g>

  <g class="breath" filter="url(#shadow)">
    <circle class="pulse" cx="280" cy="209" r="70" fill="#0F7CFF"/>
    <rect x="216" y="145" width="128" height="128" rx="30" fill="url(#chip)" stroke="#5DA8FF" stroke-width="2"/>
    <path d="M216 177h-16M216 209h-16M216 241h-16M344 177h16M344 209h16M344 241h16M248 145v-16M280 145v-16M312 145v-16M248 273v16M280 273v16M312 273v16" stroke="#5DA8FF" stroke-width="2.4" stroke-linecap="round" opacity=".7"/>
    <rect x="248" y="180" width="64" height="12" rx="6" class="accent"/>
    <rect x="248" y="206" width="76" height="8" rx="4" fill="#DCE8F4"/>
    <rect x="248" y="224" width="54" height="8" rx="4" fill="#93A6BB"/>
    <text x="250" y="252" class="mono" fill="#DCE8F4" font-size="13">gcms</text>
  </g>
</svg>
