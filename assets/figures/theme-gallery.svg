<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" role="img" aria-label="Theme gallery with realistic website previews">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ed"/>
      <stop offset=".54" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#edf8ff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#eaf7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#44342e" flood-opacity=".16"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #7d7871; }
      .ink { fill: #15171a; }
      .accent { fill: #a83d31; }
      .line { stroke: #e3ded4; }
      .tiny { font-size: 12px; }
      .small { font-size: 15px; }
      .label { font-size: 17px; font-weight: 700; }
      .title { font-size: 34px; font-weight: 800; }
    </style>
  </defs>
  <rect width="1280" height="560" rx="34" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="92" y="86" width="224" height="392" rx="28" fill="#fffaf3"/>
    <rect x="344" y="68" width="720" height="424" rx="28" fill="#fff"/>
    <rect x="806" y="204" width="348" height="230" rx="24" fill="#0d141d"/>
  </g>
  <rect x="116" y="116" width="176" height="48" rx="14" fill="#fff" stroke="#e5ddd2"/>
  <text x="140" y="146" class="label accent">Theme library</text>
  <g>
    <rect x="116" y="194" width="176" height="70" rx="16" fill="#fff" stroke="#b64a3d" stroke-width="2"/>
    <rect x="134" y="212" width="62" height="10" rx="5" fill="#a83d31"/>
    <rect x="134" y="236" width="118" height="8" rx="4" fill="#d9d1c7"/>
    <circle cx="268" cy="229" r="10" fill="#a83d31"/>
