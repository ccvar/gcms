  <rect x="344" y="68" width="720" height="54" rx="28" fill="#faf7f1"/>
  <circle cx="378" cy="95" r="6" fill="#d9c9bc"/>
  <circle cx="400" cy="95" r="6" fill="#d9c9bc"/>
  <circle cx="422" cy="95" r="6" fill="#d9c9bc"/>
  <rect x="466" y="84" width="302" height="22" rx="11" fill="#fff" stroke="#e5ddd2"/>
  <text x="488" y="100" class="tiny muted">ccvar.com</text>
  <rect x="344" y="122" width="720" height="70" fill="#fff" stroke="#eee8df"/>
  <rect x="386" y="143" width="30" height="30" rx="8" fill="#a83d31"/>
  <text x="429" y="164" class="small ink">gcms</text>
  <text x="792" y="164" class="tiny ink">Home</text>
  <text x="842" y="164" class="tiny muted">Docs</text>
  <text x="888" y="164" class="tiny muted">Resources</text>
  <text x="966" y="164" class="tiny muted">Contact</text>

  <rect x="344" y="192" width="720" height="300" fill="url(#hero)"/>
  <text x="394" y="255" class="tiny accent">GO · SQLITE · SEO</text>
  <text x="394" y="305" class="title ink">One content set,</text>
  <text x="394" y="350" class="title ink">many public faces.</text>
  <rect x="396" y="382" width="260" height="13" rx="6.5" fill="#c8d3dd"/>
  <rect x="396" y="410" width="210" height="13" rx="6.5" fill="#dce5eb"/>
  <rect x="724" y="242" width="236" height="164" rx="24" fill="#fff" stroke="#e4ded5"/>
  <rect x="752" y="272" width="96" height="18" rx="9" fill="#a83d31"/>
  <rect x="752" y="318" width="160" height="12" rx="6" fill="#d8d0c5"/>
  <rect x="752" y="346" width="132" height="12" rx="6" fill="#e7e1d8"/>
  <rect x="826" y="390" width="96" height="8" rx="4" fill="#a83d31" opacity=".28"/>

  <rect x="806" y="204" width="348" height="48" rx="24" fill="#111b27"/>
  <circle cx="834" cy="228" r="5" fill="#5df2b1"/>
  <circle cx="854" cy="228" r="5" fill="#36556a"/>
  <circle cx="874" cy="228" r="5" fill="#36556a"/>
  <text x="902" y="233" class="tiny" fill="#6cf0b5">Terminal theme</text>
  <text x="842" y="292" font-size="24" font-weight="800" fill="#f7fbff">~/gcms</text>
