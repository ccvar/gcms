  <rect x="842" y="354" width="194" height="10" rx="5" fill="#31485c"/>
  <rect x="842" y="382" width="150" height="10" rx="5" fill="#31485c"/>

  <g filter="url(#shadow)">
    <rect x="716" y="420" width="326" height="78" rx="22" fill="#fff"/>
  </g>
  <text x="748" y="453" class="label ink">Preview before switching</text>
  <rect x="748" y="470" width="120" height="10" rx="5" fill="#d8d0c5"/>
  <rect x="888" y="470" width="94" height="10" rx="5" fill="#a83d31" opacity=".65"/>
