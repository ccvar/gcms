    <rect x="116" y="298" width="176" height="70" rx="16" fill="#101820" stroke="#263445"/>
    <rect x="134" y="316" width="74" height="10" rx="5" fill="#5df2b1"/>
    <rect x="134" y="340" width="112" height="8" rx="4" fill="#344456"/>
    <text x="134" y="390" class="small muted">Terminal</text>

    <rect x="116" y="402" width="176" height="46" rx="16" fill="#f6f8ff" stroke="#dddfff"/>
    <rect x="134" y="419" width="72" height="8" rx="4" fill="#745cff"/>
    <rect x="134" y="438" width="108" height="7" rx="3.5" fill="#d8d2ff"/>
