<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" role="img" aria-label="Realistic install terminal, Caddyfile and live site deployment">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ed"/>
      <stop offset="1" stop-color="#eef8ff"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0v56" fill="none" stroke="#d8e9f6" stroke-width="2" opacity=".55"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#58362e" flood-opacity=".15"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .ink { fill: #17191c; }
      .muted { fill: #7b7f86; }
      .accent { fill: #a83d31; }
      .small { font-size: 14px; }
      .label { font-size: 16px; font-weight: 700; }
      .title { font-size: 24px; font-weight: 800; }
    </style>
  </defs>
  <rect width="1280" height="560" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="560" rx="34" fill="url(#grid)"/>
  <g filter="url(#shadow)">
    <rect x="92" y="90" width="520" height="342" rx="26" fill="#111827"/>
    <rect x="662" y="90" width="226" height="342" rx="24" fill="#fff"/>
    <rect x="928" y="90" width="258" height="342" rx="24" fill="#fff"/>
  </g>
  <rect x="92" y="90" width="520" height="48" rx="26" fill="#182335"/>
  <circle cx="126" cy="114" r="6" fill="#f5a55b"/>
  <circle cx="148" cy="114" r="6" fill="#e5675a"/>
  <circle cx="170" cy="114" r="6" fill="#62d48a"/>
  <text x="202" y="120" class="small mono" fill="#a7b5c8">install.sh</text>
  <text x="126" y="176" class="mono" font-size="16" fill="#f7efe8">$ curl -fsSL https://raw.githubusercontent.com/ccvar/</text>
  <text x="126" y="206" class="mono" font-size="16" fill="#f7efe8">  gcms-releases/main/install.sh | sh</text>
  <text x="126" y="258" class="mono" font-size="16" fill="#7dd3fc">Downloading cms-v1.0.12-linux-amd64.tar.gz</text>
  <text x="126" y="304" class="mono" font-size="16" fill="#b7f7d1">Installed to /opt/gcms</text>
  <text x="126" y="350" class="mono" font-size="16" fill="#f7efe8">$ ./scripts/cms.sh start</text>
  <text x="126" y="386" class="mono" font-size="16" fill="#b7f7d1">Listening on 127.0.0.1:8080</text>

  <text x="696" y="132" class="title ink">Caddyfile</text>
  <rect x="694" y="164" width="158" height="220" rx="16" fill="#f7fbff" stroke="#dbe8f0"/>
  <text x="716" y="204" class="mono small accent">ccvar.com {</text>
  <text x="716" y="236" class="mono small muted">  encode zstd gzip</text>
  <text x="716" y="268" class="mono small muted">  reverse_proxy</text>
  <text x="716" y="300" class="mono small muted">  127.0.0.1:8080</text>
  <text x="716" y="332" class="mono small accent">}</text>

  <rect x="928" y="90" width="258" height="52" rx="24" fill="#faf7f1"/>
  <rect x="956" y="108" width="154" height="18" rx="9" fill="#fff" stroke="#e5ddd3"/>
  <text x="974" y="122" class="small muted">https://ccvar.com</text>
  <rect x="956" y="174" width="34" height="34" rx="9" fill="#a83d31"/>
  <text x="1006" y="198" class="label ink">gcms</text>
  <rect x="956" y="240" width="160" height="18" rx="9" fill="#a83d31"/>
  <rect x="956" y="282" width="196" height="10" rx="5" fill="#cbd7dd"/>
  <rect x="956" y="306" width="170" height="10" rx="5" fill="#dce6ea"/>
  <rect x="956" y="356" width="76" height="30" rx="15" fill="#1d8b5e"/>
  <text x="974" y="376" class="small" fill="#fff">Online</text>
</svg>
