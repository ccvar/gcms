<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" role="img" aria-label="Realistic Go binary and SQLite runtime folder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#fff8ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#294653" flood-opacity=".14"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .ink { fill: #17191c; }
      .muted { fill: #7d817f; }
      .accent { fill: #a83d31; }
      .small { font-size: 14px; }
      .label { font-size: 16px; font-weight: 700; }
      .title { font-size: 26px; font-weight: 800; }
    </style>
  </defs>
  <rect width="1280" height="560" rx="34" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="102" y="82" width="504" height="398" rx="28" fill="#fff"/>
    <rect x="654" y="82" width="238" height="180" rx="24" fill="#fff"/>
    <rect x="654" y="300" width="238" height="180" rx="24" fill="#fff"/>
    <rect x="940" y="82" width="238" height="398" rx="24" fill="#fff"/>
  </g>
  <rect x="102" y="82" width="504" height="58" rx="28" fill="#faf7f1"/>
  <text x="136" y="119" class="label ink">/opt/gcms</text>
  <rect x="136" y="174" width="420" height="48" rx="14" fill="#fff8ee" stroke="#ead7c2"/>
  <text x="160" y="204" class="mono small accent">bin/cms</text>
  <text x="320" y="204" class="small muted">single Go binary</text>
  <rect x="136" y="242" width="420" height="48" rx="14" fill="#f7fbff" stroke="#dbe8f0"/>
  <text x="160" y="272" class="mono small" fill="#227aa1">data/cms.db</text>
  <text x="320" y="272" class="small muted">SQLite content file</text>
  <rect x="136" y="310" width="420" height="48" rx="14" fill="#f8faf6" stroke="#dfe8d8"/>
  <text x="160" y="340" class="mono small" fill="#1d8b5e">assets/</text>
  <text x="320" y="340" class="small muted">uploads and overrides</text>
  <rect x="136" y="378" width="420" height="48" rx="14" fill="#f8f6ff" stroke="#e1dcff"/>
  <text x="160" y="408" class="mono small" fill="#705be8">scripts/cms.sh</text>
  <text x="320" y="408" class="small muted">start, stop, update</text>

  <text x="692" y="128" class="title ink">Binary</text>
  <rect x="712" y="154" width="112" height="76" rx="18" fill="#a83d31"/>
  <path d="M744 192h48M768 168v48" stroke="#fff7ed" stroke-width="11" stroke-linecap="round"/>
  <text x="692" y="346" class="title ink">Database</text>
  <ellipse cx="774" cy="386" rx="72" ry="24" fill="#eaf7ff" stroke="#217ca3" stroke-width="7"/>
  <path d="M702 386v52c0 14 32 24 72 24s72-10 72-24v-52" fill="none" stroke="#217ca3" stroke-width="7"/>

  <text x="976" y="128" class="title ink">Process</text>
  <rect x="976" y="160" width="166" height="40" rx="14" fill="#eefaf3" stroke="#d6eadf"/>
  <circle cx="1000" cy="180" r="8" fill="#1d8b5e"/>
  <text x="1020" y="185" class="small muted">running</text>
  <rect x="976" y="232" width="166" height="86" rx="16" fill="#111827"/>
  <text x="998" y="264" class="mono small" fill="#f7efe8">GET /zh/</text>
  <text x="998" y="292" class="mono small" fill="#b7f7d1">200 8ms</text>
  <rect x="976" y="350" width="166" height="76" rx="16" fill="#fff8ee" stroke="#ead7c2"/>
  <text x="998" y="382" class="small muted">No Node runtime</text>
  <text x="998" y="410" class="small muted">No build on server</text>
</svg>
