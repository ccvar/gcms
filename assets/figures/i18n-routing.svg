<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" role="img" aria-label="Realistic multilingual routing with language switcher and hreflang">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef8ff"/>
      <stop offset="1" stop-color="#fff8ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#2c5360" flood-opacity=".14"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .ink { fill: #17191c; }
      .muted { fill: #7b8188; }
      .accent { fill: #a83d31; }
      .small { font-size: 14px; }
      .label { font-size: 16px; font-weight: 700; }
      .title { font-size: 24px; font-weight: 800; }
    </style>
  </defs>
  <rect width="1280" height="560" rx="34" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="98" y="92" width="446" height="304" rx="26" fill="#fff"/>
    <rect x="736" y="92" width="446" height="304" rx="26" fill="#fff"/>
    <rect x="508" y="168" width="264" height="232" rx="24" fill="#fffaf3"/>
  </g>
  <rect x="98" y="92" width="446" height="50" rx="26" fill="#faf7f1"/>
  <rect x="130" y="108" width="220" height="20" rx="10" fill="#fff" stroke="#e5ddd3"/>
  <text x="148" y="123" class="small muted">ccvar.com/zh/docs</text>
  <rect x="130" y="174" width="34" height="34" rx="9" fill="#a83d31"/>
  <text x="180" y="198" class="label ink">简记</text>
  <text x="130" y="258" class="title ink">中文内容</text>
  <rect x="130" y="286" width="314" height="10" rx="5" fill="#ccd8e0"/>
  <rect x="130" y="314" width="246" height="10" rx="5" fill="#dbe5eb"/>
  <rect x="404" y="174" width="88" height="34" rx="17" fill="#fff8ee" stroke="#ead7c2"/>
  <text x="426" y="196" class="small accent">中文</text>

  <rect x="736" y="92" width="446" height="50" rx="26" fill="#faf7f1"/>
  <rect x="768" y="108" width="220" height="20" rx="10" fill="#fff" stroke="#e5ddd3"/>
  <text x="786" y="123" class="small muted">ccvar.com/en/docs</text>
  <rect x="768" y="174" width="34" height="34" rx="9" fill="#a83d31"/>
  <text x="818" y="198" class="label ink">gcms</text>
  <text x="768" y="258" class="title ink">English content</text>
  <rect x="768" y="286" width="298" height="10" rx="5" fill="#ccd8e0"/>
  <rect x="768" y="314" width="230" height="10" rx="5" fill="#dbe5eb"/>
  <rect x="1044" y="174" width="88" height="34" rx="17" fill="#f7fbff" stroke="#dbe8f0"/>
  <text x="1068" y="196" class="small" fill="#227aa1">EN</text>

  <text x="548" y="218" class="title ink">Language map</text>
  <rect x="548" y="252" width="184" height="34" rx="17" fill="#fff" stroke="#e5ddd3"/>
  <text x="570" y="274" class="mono small muted">/zh/posts/...</text>
  <rect x="548" y="306" width="184" height="34" rx="17" fill="#fff" stroke="#e5ddd3"/>
  <text x="570" y="328" class="mono small muted">/en/posts/...</text>
  <text x="548" y="374" class="small accent">hreflang links connect both pages</text>
  <path d="M544 246c56-40 104-40 192 0M544 346c56 40 104 40 192 0" fill="none" stroke="#b64a3d" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 16"/>
</svg>
