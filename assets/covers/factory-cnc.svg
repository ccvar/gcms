<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960" role="img" aria-label="CNC machined part placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef1f4"/>
      <stop offset="1" stop-color="#e4e9ee"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0v64" fill="none" stroke="#d3dbe2" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="1280" height="960" fill="url(#bg)"/>
  <rect width="1280" height="960" fill="url(#grid)"/>
  <!-- 铣削铝块（斜切角 + 孔位） -->
  <g>
    <path d="M400 330 h420 l60 60 v240 h-480 z" fill="#8fa2b2"/>
    <path d="M400 330 h420 l60 60 h-480 z" fill="#a9bac8"/>
    <path d="M400 390 h480 v240 h-480 z" fill="#7c93a6"/>
    <rect x="430" y="420" width="420" height="180" rx="10" fill="#33414e"/>
    <circle cx="510" cy="510" r="34" fill="#eef1f4"/>
    <circle cx="510" cy="510" r="16" fill="#56718a"/>
    <circle cx="770" cy="510" r="34" fill="#eef1f4"/>
    <circle cx="770" cy="510" r="16" fill="#56718a"/>
    <rect x="590" y="480" width="100" height="60" rx="8" fill="#eef1f4"/>
  </g>
  <!-- 工程标注：十字定位 + 尺寸线 -->
  <g stroke="#3e6d94" stroke-width="3" fill="none">
    <path d="M640 250 v50 M600 290 h80"/>
    <circle cx="640" cy="290" r="26"/>
    <path d="M400 700 v28 M880 700 v28 M400 714 h480" stroke-dasharray="none"/>
    <path d="M940 390 h60 M970 360 v60" stroke-dasharray="8 8"/>
  </g>
  <g fill="#3e6d94" font-family="ui-monospace,Menlo,monospace" font-size="30" letter-spacing="4">
    <text x="588" y="770">±0.01</text>
  </g>
</svg>
