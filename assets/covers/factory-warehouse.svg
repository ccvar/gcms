<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960" role="img" aria-label="Warehouse and logistics illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef1f4"/>
      <stop offset="1" stop-color="#e4e9ee"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0v64" fill="none" stroke="#d3dbe2" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="1280" height="960" fill="url(#bg)"/>
  <rect width="1280" height="960" fill="url(#grid)"/>
  <!-- 立体货架 ×2 -->
  <g>
    <g stroke="#7c93a6" stroke-width="14">
      <path d="M220 300 v420 M560 300 v420"/>
      <path d="M206 430 h368 M206 580 h368 M206 720 h368" stroke-width="10"/>
    </g>
    <rect x="250" y="360" width="120" height="66" rx="4" fill="#33414e"/>
    <rect x="400" y="360" width="120" height="66" rx="4" fill="#56718a"/>
    <rect x="250" y="510" width="120" height="66" rx="4" fill="#56718a"/>
    <rect x="400" y="510" width="120" height="66" rx="4" fill="#8fa2b2"/>
    <rect x="250" y="650" width="120" height="66" rx="4" fill="#8fa2b2"/>
    <rect x="400" y="650" width="120" height="66" rx="4" fill="#33414e"/>
  </g>
  <!-- 叉车：门架 + 货叉 + 托盘箱 -->
  <g>
    <rect x="840" y="520" width="200" height="130" rx="14" fill="#8fa2b2"/>
    <rect x="880" y="440" width="120" height="90" rx="10" fill="#a9bac8"/>
    <rect x="800" y="430" width="18" height="260" fill="#33414e"/>
    <path d="M800 690 h-110" stroke="#33414e" stroke-width="14" stroke-linecap="round"/>
    <rect x="668" y="600" width="120" height="84" rx="6" fill="#56718a"/>
    <circle cx="880" cy="690" r="34" fill="#33414e"/>
    <circle cx="1010" cy="690" r="34" fill="#33414e"/>
    <circle cx="880" cy="690" r="12" fill="#eef1f4"/>
    <circle cx="1010" cy="690" r="12" fill="#eef1f4"/>
  </g>
  <!-- 工程标注 -->
  <g stroke="#3e6d94" stroke-width="3" fill="none">
    <path d="M220 780 v24 M1040 780 v24 M220 792 h820"/>
    <path d="M1100 380 h60 M1130 350 v60" stroke-dasharray="8 8"/>
  </g>
  <g fill="#3e6d94" font-family="ui-monospace,Menlo,monospace" font-size="30" letter-spacing="4">
    <text x="560" y="838">WH-03</text>
  </g>
</svg>
